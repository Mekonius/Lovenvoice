name: Jarvis Briefing

# Runs the whole pipeline in the cloud on a schedule — no personal server needed.
# GitHub provides the "always-on" scheduler; nothing of yours runs 24/7.

on:
  schedule:
    # GitHub cron is UTC. Copenhagen is UTC+1 (winter) / UTC+2 (summer, DST),
    # so a single line can't hit 06:45 local year-round.
    # 05:45 UTC = 06:45 CET (winter) / 07:45 CEST (summer).
    # For 06:45 in summer instead, change to '45 4 * * *'.
    - cron: "45 5 * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

# Needed only if you later switch delivery to committing files / Releases.
permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    # R2 creds live at job level so the upload step can be skipped when unset.
    env:
      # Cloudflare account id — not a secret (it's in every R2 endpoint URL).
      # Hardcoded so the upload can't fail on a missing/misnamed secret.
      R2_ACCOUNT_ID: "92306825790dab68daed4de288efdf55"
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing
        env:
          # LLM: free Groq tier (Gemini's free tier gives 0 quota on many
          # projects). Gemini stays configured as an automatic fallback, so if
          # its free quota ever activates it'll be used when Groq rate-limits.
          CURATE_PROVIDER: groq
          WRITE_PROVIDER: groq
          # Curation runs on the stronger 70B for better editorial judgment
          # (rejecting warning/alarm stories, holding the positive-progress bar).
          # It's a SINGLE call/day (~few k tokens), so it stays well under Groq's
          # 70B 100k-tokens/DAY free cap. Writing stays on the fast 8B — it's ~11
          # calls/run, which would blow that cap on 70B; the voice comes from the
          # prompts, not the model size.
          CURATE_MODEL: llama-3.3-70b-versatile
          WRITE_MODEL: llama-3.1-8b-instant
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FALLBACK_PROVIDER: gemini
          FALLBACK_MODEL: gemini-2.0-flash
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # TTS: Google Cloud TTS — natural Danish-female Chirp 3 HD voice.
          # Free within Google's monthly character allowance (billing enabled).
          # For English again, set BRIEFING_LANGUAGE=English and
          # GOOGLE_TTS_VOICE=en-GB-Chirp3-HD-Aoede.
          TTS_PROVIDER: google
          GOOGLE_TTS_VOICE: da-DK-Chirp3-HD-Aoede
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          # Fallback voice if you ever set TTS_PROVIDER=edge (free, no key).
          EDGE_TTS_VOICE: da-DK-ChristelNeural
          # Personalisation
          LISTENER_NAME: Kenneth
          BRIEFING_TIMEZONE: Europe/Copenhagen
          # Language the briefing is written and spoken in.
          BRIEFING_LANGUAGE: Danish
        run: python briefing.py

      # Always attach the audio to the run — download & play it straight from
      # the Actions page. This needs NO cloud setup, so a first run works with
      # only GEMINI_API_KEY configured.
      - name: Upload briefing audio as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-audio
          path: |
            output/*.mp3
            output/*.m4a
          retention-days: 14
          if-no-files-found: warn

      # Optional hands-off phone delivery. Skipped automatically unless you've
      # added the R2 secrets (R2_BUCKET etc.).
      - name: Upload MP3 to Cloudflare R2
        if: ${{ env.R2_BUCKET != '' }}
        continue-on-error: true # delivery is best-effort; the audio artifact is the deliverable
        run: |
          set -euo pipefail
          FILE=$(ls -t output/briefing_*.mp3 | head -1)
          echo "Uploading $FILE to R2 bucket $R2_BUCKET"
          # boto3 uploader (aws CLI trips R2 with SignatureDoesNotMatch).
          # audio/mpeg so the iOS Shortcut plays it instead of downloading;
          # no-cache on latest.mp3 so the phone always fetches the fresh one.
          # Dated copy (archive) + a stable latest.mp3 for the iOS Shortcut.
          python scripts/r2_upload.py "$FILE" "$(basename "$FILE")" \
            --content-type audio/mpeg
          python scripts/r2_upload.py "$FILE" latest.mp3 \
            --content-type audio/mpeg --cache-control no-cache

      - name: Save run logs as an artifact
        if: always() # keep debug logs even when a stage fails
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: runs/
          retention-days: 7
          if-no-files-found: ignore
