name: Danish Voice Test

# Quick way to hear a short Danish sample without running the whole briefing.
# Synthesises a few sentences with a Danish edge-tts voice and uploads it to R2
# as da-test.mp3, so you can play it from your phone at
#   https://pub-830b7f13c48643f69223da92bbfda349.r2.dev/da-test.mp3
# Run manually from the Actions tab; pick the voice from the dropdown.

on:
  workflow_dispatch:
    inputs:
      voice:
        description: "Danish voice to test"
        type: choice
        default: da-DK-ChristelNeural
        options:
          - da-DK-ChristelNeural # female
          - da-DK-JeppeNeural # male

permissions:
  contents: read

jobs:
  davoice:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: "92306825790dab68daed4de288efdf55"
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install "edge-tts>=6.1.0" "boto3>=1.35.0"

      - name: Synthesise Danish sample
        env:
          VOICE: ${{ inputs.voice }}
        run: |
          python - <<'PY'
          import asyncio, os, edge_tts
          voice = os.environ["VOICE"]
          script = (
              "Godmorgen, Kenneth. Klokken er syv, og her er dit overblik for i dag. "
              "Forskere har præsenteret et gennembrud inden for grøn energi. "
              "En ny behandling giver håb til millioner af patienter. "
              "Og et rumfartøj har netop sendt de første billeder hjem fra en fjern måne. "
              "Lad os gå i gang."
          )
          async def main():
              await edge_tts.Communicate(script, voice).save("da-test.mp3")
          asyncio.run(main())
          print("Wrote da-test.mp3 with voice", voice)
          PY

      - name: Upload sample to R2
        if: ${{ env.R2_BUCKET != '' }}
        run: |
          python scripts/r2_upload.py da-test.mp3 da-test.mp3 \
            --content-type audio/mpeg --cache-control no-cache

      # Google Cloud TTS Danish samples — more natural than edge-tts, still free
      # for daily use. Tries several voice tiers; uploads each that succeeds so
      # you can A/B them. Skipped automatically if no GOOGLE_TTS_API_KEY.
      - name: Synthesise Google Danish samples
        if: ${{ env.GOOGLE_TTS_API_KEY != '' && env.R2_BUCKET != '' }}
        run: |
          python - <<'PY'
          import base64, os, requests
          key = os.environ["GOOGLE_TTS_API_KEY"]
          script = (
              "Godmorgen, Kenneth. Klokken er syv, og her er dit overblik for i dag. "
              "Forskere har præsenteret et gennembrud inden for grøn energi. "
              "En ny behandling giver håb til millioner af patienter. "
              "Og et rumfartøj har netop sendt de første billeder hjem fra en fjern måne. "
              "Lad os gå i gang."
          )
          # Female Danish voices, newest/most-natural first. Each -> its own file.
          candidates = [
              ("hd", "da-DK-Chirp3-HD-Aoede"),
              ("wavenet", "da-DK-Wavenet-A"),
              ("neural2", "da-DK-Neural2-D"),
          ]
          url = "https://texttospeech.googleapis.com/v1/text:synthesize"
          made = []
          for tag, voice in candidates:
              body = {
                  "input": {"text": script},
                  "voice": {"languageCode": "da-DK", "name": voice},
                  "audioConfig": {"audioEncoding": "MP3"},
              }
              r = requests.post(url, params={"key": key}, json=body, timeout=60)
              if r.status_code != 200:
                  print(f"[skip] {voice}: {r.status_code} {r.text[:200]}")
                  continue
              fname = f"da-google-{tag}.mp3"
              with open(fname, "wb") as fh:
                  fh.write(base64.b64decode(r.json()["audioContent"]))
              print(f"[ok]   {voice} -> {fname}")
              made.append(fname)
          with open("made.txt", "w") as fh:
              fh.write("\n".join(made))
          if not made:
              raise SystemExit("No Google voice succeeded — check the API key / enabled API.")
          PY

      - name: Upload Google samples to R2
        if: ${{ env.GOOGLE_TTS_API_KEY != '' && env.R2_BUCKET != '' }}
        run: |
          set -euo pipefail
          while read -r f; do
            [ -n "$f" ] || continue
            python scripts/r2_upload.py "$f" "$f" \
              --content-type audio/mpeg --cache-control no-cache
          done < made.txt

      - name: Also attach as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: da-voice-sample
          path: |
            da-test.mp3
            da-google-*.mp3
          if-no-files-found: warn
