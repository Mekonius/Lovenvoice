name: R2 Test

# Fast (~20s) credential check for Cloudflare R2 — uploads a tiny text file so
# we can verify the R2 secrets without running the full ~8-minute briefing.
# Run manually from the Actions tab.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  r2test:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: "92306825790dab68daed4de288efdf55"
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install boto3
        run: pip install "boto3>=1.35.0"

      - name: Upload a test object to R2 (boto3)
        run: |
          set -euo pipefail
          echo "R2_BUCKET set? ${R2_BUCKET:+yes}"
          echo "AWS_ACCESS_KEY_ID length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY length: ${#AWS_SECRET_ACCESS_KEY}"
          echo "jarvis r2 test at $(date -u)" > r2-test.txt
          python scripts/r2_upload.py r2-test.txt r2-test.txt --content-type text/plain
          echo "✅ Upload OK — credentials work."
