name: R2 Test

# Fast (~20s) credential check for Cloudflare R2 — uploads a tiny text file so
# we can verify the R2 secrets without running the full ~8-minute briefing.
# Run manually from the Actions tab.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  r2test:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: "92306825790dab68daed4de288efdf55"
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    steps:
      - name: Upload a test object to R2
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          echo "R2_BUCKET set? ${R2_BUCKET:+yes}"
          echo "AWS_ACCESS_KEY_ID length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY length: ${#AWS_SECRET_ACCESS_KEY}"
          echo "jarvis r2 test at $(date -u)" > r2-test.txt
          aws s3 cp r2-test.txt "s3://${R2_BUCKET}/r2-test.txt" \
            --endpoint-url "$ENDPOINT" --content-type text/plain
          echo "✅ Upload OK — credentials work. Bucket contents:"
          aws s3 ls "s3://${R2_BUCKET}/" --endpoint-url "$ENDPOINT"
