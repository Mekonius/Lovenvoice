# ── Jarvis Briefing feed list ───────────────────────────────────────────────
# Editable RSS/Atom sources for Stage 1 (Fetch).
#
# To add a feed: append a `- name: ... url: ...` entry under `feeds`.
# `name` becomes the "source" attribute on every candidate story.
# Feeds are fetched with a browser user-agent; one that fails to load is
# skipped with a warning — a bad URL won't break the run.
#
# Leans science / health / climate / tech / space plus dedicated
# solutions-journalism and good-news desks, since the editorial brief rewards
# consequential, verifiable progress. The curator still filters out
# clickbait and manufactured positivity.

feeds:
  # ── Science ──
  - name: Nature News
    url: https://www.nature.com/nature.rss
  - name: Science Daily (Top)
    url: https://www.sciencedaily.com/rss/top/science.xml
  - name: Quanta Magazine
    url: https://api.quantamagazine.org/feed/
  - name: Phys.org
    url: https://phys.org/rss-feed/

  # ── Space ──
  - name: ESA Top News
    url: https://www.esa.int/rssfeed/Our_Activities/Space_News
  - name: NASA Breaking News
    url: https://www.nasa.gov/news-release/feed/

  # ── Health / medicine ──
  - name: WHO News
    url: https://www.who.int/rss-feeds/news-english.xml
  - name: STAT News
    url: https://www.statnews.com/feed/

  # ── Climate / energy / environment ──
  - name: Yale Environment 360
    url: https://e360.yale.edu/feed.xml
  - name: Carbon Brief
    url: https://www.carbonbrief.org/feed/
  - name: Mongabay
    url: https://news.mongabay.com/feed/

  # ── Technology / AI ──
  - name: MIT News
    url: https://news.mit.edu/rss/feed
  - name: MIT Technology Review
    url: https://www.technologyreview.com/feed/

  # ── University press rooms ──
  - name: Stanford News
    url: https://news.stanford.edu/feed/
  - name: Harvard Gazette
    url: https://news.harvard.edu/gazette/feed/

  # ── Solutions journalism / good news / global development ──
  - name: Positive News
    url: https://www.positive.news/feed/
  - name: Good News Network
    url: https://www.goodnewsnetwork.org/feed/
  - name: Reasons to be Cheerful
    url: https://reasonstobecheerful.world/feed/
  - name: Our World in Data
    url: https://ourworldindata.org/atom.xml
  - name: UN News
    url: https://news.un.org/feed/subscribe/en/news/all/rss.xml
